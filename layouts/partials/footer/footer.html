<!-- Overrides theme partial of the same name. -->
<!-- Adds a "Last updated on" line below the launched-on copyright. The date is the
     site build date (now), which equals the last deploy since CI rebuilds on every
     merge to main. Native Hugo, no external dependencies or CSP changes. -->
<footer class="py-3 mt-auto bg-light">
  <div class="container py-1 my-1">
    <div class="d-flex flex-wrap justify-content-between align-items-center">
      <div class="col-md mb-0 text-muted">
        <p class="mb-0">{{ .Site.Copyright | safeHTML }}</p>
        <p class="mb-0">Last Updated On {{ now.Format "2 January 2006" }}</p>
      </div>
      <ul class="nav col-md-auto justify-content-end">
        {{ range .Site.Menus.footer -}}
        <li class="nav-item"><a href="{{ .URL }}" class="nav-link px-2 text-muted"{{ with .Title }} title='{{ . }}' aria-label='{{ . }}'{{ end }}>{{ .Name }}</a></li>
        {{ end -}}
      </ul>
    </div>
  </div>
</footer>
